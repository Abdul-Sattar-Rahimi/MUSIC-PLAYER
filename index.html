<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0818;
      /* اگه background.jpg رو توی ریپو گذاشتی، این خط فعاله */
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 24px;
    }

    /* ===== GLASS CARD ===== */
    .player {
      width: 360px;
      background: rgba(20, 14, 50, 0.55);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(160, 130, 255, 0.25);
      border-radius: 28px;
      padding: 24px 22px 20px;
      box-shadow:
        0 0 0 1px rgba(120, 90, 255, 0.1),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    /* top shimmer */
    .player::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,170,255,0.5), transparent);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .header-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #c4a9ff;
      text-transform: uppercase;
    }
    .header-menu {
      display: flex; flex-direction: column; gap: 3px; cursor: pointer; padding: 4px;
    }
    .header-menu span {
      display: block; width: 18px; height: 2px;
      background: rgba(196,169,255,0.7); border-radius: 2px;
    }
    .header-menu span:first-child { width: 12px; }

    /* ===== ALBUM ART + RING ===== */
    .art-section {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
    }

    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
    }

    /* outer progress ring (SVG) */
    .ring-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      animation: spin-cw 6s linear infinite;
      animation-play-state: paused;
    }
    .ring-svg.playing { animation-play-state: running; }

    @keyframes spin-cw   { to { transform: rotate(360deg); } }
    @keyframes spin-ccw  { to { transform: rotate(-360deg); } }

    /* album cover */
    .cover-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 170px; height: 170px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(150,110,255,0.35);
      box-shadow: 0 0 30px rgba(120,80,255,0.3), inset 0 0 20px rgba(0,0,0,0.4);
    }
    .cover-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      animation: spin-ccw 8s linear infinite;
      animation-play-state: paused;
    }
    .cover-img.playing { animation-play-state: running; }

    /* center hole */
    .cover-hole {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #18102e;
      border: 2px solid rgba(150,110,255,0.4);
      z-index: 2;
    }

    /* default art placeholder */
    .cover-placeholder {
      width: 100%; height: 100%;
      background: radial-gradient(circle at 40% 35%, #3d2875, #1a0f38);
      display: flex; align-items: center; justify-content: center;
    }
    .cover-placeholder svg { opacity: 0.3; }

    /* ===== TIME ROW ===== */
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(200,180,255,0.6);
      margin-bottom: 10px;
      padding: 0 4px;
    }

    /* ===== HEART ===== */
    .heart-row {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .btn-heart {
      background: none; border: none; cursor: pointer;
      color: rgba(200,150,255,0.4);
      font-size: 18px;
      transition: color 0.2s, transform 0.2s;
      padding: 2px 8px;
    }
    .btn-heart.liked { color: #c084fc; }
    .btn-heart:hover { transform: scale(1.2); }

    /* ===== TRACK INFO ===== */
    .track-info {
      text-align: center;
      margin-bottom: 16px;
      position: relative;
    }
    .track-name {
      font-size: 22px;
      font-weight: 700;
      color: #f0eaff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-sub {
      font-size: 13px;
      color: #9b7fd4;
      margin-top: 3px;
    }
    .btn-more {
      position: absolute;
      right: 0; top: 4px;
      background: none; border: none;
      color: rgba(180,150,255,0.5);
      cursor: pointer; font-size: 18px; line-height: 1;
    }

    /* ===== WAVEFORM ===== */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 40px;
      margin-bottom: 18px;
      cursor: pointer;
      position: relative;
    }
    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: rgba(140, 100, 255, 0.35);
      transition: height 0.1s, background 0.3s;
      flex-shrink: 0;
    }
    .wave-bar.played {
      background: rgba(180, 140, 255, 0.8);
    }
    .wave-bar.active {
      animation: pulse-bar 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-bar {
      from { transform: scaleY(0.7); }
      to   { transform: scaleY(1.3); }
    }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .btn-ctrl {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(160,120,255,0.2);
      border-radius: 50%;
      color: rgba(220,200,255,0.75);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease;
      backdrop-filter: blur(8px);
    }
    .btn-ctrl:hover {
      background: rgba(120,80,255,0.2);
      border-color: rgba(160,120,255,0.5);
      color: #e0d0ff;
    }
    .btn-ctrl:active { transform: scale(0.92); }

    .btn-sm  { width: 42px; height: 42px; }
    .btn-md  { width: 48px; height: 48px; }

    .btn-play {
      width: 64px; height: 64px;
      background: rgba(120, 80, 255, 0.7);
      border: 2px solid rgba(180,140,255,0.6);
      box-shadow: 0 0 24px rgba(120,80,255,0.5), 0 0 60px rgba(120,80,255,0.2);
    }
    .btn-play:hover {
      background: rgba(140, 100, 255, 0.85);
      box-shadow: 0 0 36px rgba(140,100,255,0.7);
    }

    .btn-ctrl.active {
      color: #c084fc;
      border-color: rgba(192,132,252,0.5);
      background: rgba(120,80,255,0.15);
    }

    /* ===== VOLUME ===== */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .vol-icon { color: rgba(160,130,255,0.55); flex-shrink: 0; }
    .vol-track {
      flex: 1; height: 3px;
      background: rgba(100,70,200,0.25);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
    }
    .vol-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c4fff, #c084fc);
      border-radius: 99px;
      position: relative;
    }
    .vol-thumb {
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #c084fc;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(192,132,252,0.6);
    }
    input[type=range].vol-slider {
      position: absolute;
      inset: -8px 0;
      width: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    /* ===== SELECT FILE ===== */
    .select-row {
      margin-bottom: 10px;
    }
    .file-input { display: none; }
    .btn-select {
      width: 100%;
      height: 46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(160,120,255,0.3);
      border-radius: 14px;
      color: #c084fc;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .btn-select:hover {
      background: rgba(120,80,255,0.15);
      border-color: rgba(192,132,252,0.5);
    }

    /* ===== STATUS ===== */
    .status {
      text-align: center;
      font-size: 12px;
      color: rgba(160,130,200,0.5);
      min-height: 18px;
    }
    .status.ok    { color: #86efac; }
    .status.error { color: #fca5a5; }
  </style>
</head>
<body>

<div class="player">

  <!-- Header -->
  <div class="header">
    <div class="header-menu">
      <span></span><span></span><span></span>
    </div>
    <span class="header-title">Music Player</span>
  </div>

  <!-- Album Art + Spinning Ring -->
  <div class="art-section">
    <div class="ring-wrap">

      <!-- Rotating ring SVG -->
      <svg class="ring-svg" id="ringSvg" viewBox="0 0 220 220" fill="none">
        <circle cx="110" cy="110" r="105" stroke="rgba(100,70,200,0.2)" stroke-width="2"/>
        <!-- dashes -->
        <circle cx="110" cy="110" r="105"
          stroke="url(#ringGrad)"
          stroke-width="2.5"
          stroke-dasharray="6 8"
          stroke-linecap="round"/>
        <!-- dot marker -->
        <circle cx="110" cy="5" r="5" fill="#c084fc"
          filter="drop-shadow(0 0 4px #c084fc)"/>
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c4fff"/>
            <stop offset="100%" stop-color="#e879f9"/>
          </linearGradient>
        </defs>
      </svg>

      <!-- Cover image -->
      <div class="cover-wrap">
        <div class="cover-placeholder" id="coverPlaceholder">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="white">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>
        <img id="coverImg" class="cover-img" src="" alt="cover" style="display:none"/>
      </div>
      <div class="cover-hole"></div>
    </div>
  </div>

  <!-- Time -->
  <div class="time-row">
    <span id="timeCurrent">0:00</span>
    <span id="timeDuration">0:00</span>
  </div>

  <!-- Heart -->
  <div class="heart-row">
    <button class="btn-heart" id="btnHeart" onclick="this.classList.toggle('liked')">♥</button>
  </div>

  <!-- Track info -->
  <div class="track-info">
    <div class="track-name" id="trackName">Dreamscape</div>
    <div class="track-sub"  id="trackSub">یک فایل انتخاب کنید</div>
    <button class="btn-more">⋮</button>
  </div>

  <!-- Waveform -->
  <div class="waveform" id="waveform"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-ctrl btn-sm" id="btnShuffle" title="Shuffle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17zm4.76-.18l3.65 3.65-3.65 3.65 1.06 1.06 4.59-4.59v-.24L16.41 8zM2.1 4.93l8.08 8.08-3.77 3.76L4 18.59 5.41 20l2.41-2.41 8.08 8.08 1.06-1.06L3.16 3.87zm16.48 8.14l-3.65-3.65-1.06 1.06 3.65 3.65z"/>
      </svg>
    </button>
    <button class="btn-ctrl btn-md" id="btnRewind" title="Rewind">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="btn-ctrl btn-play" id="btnPlay" title="Play/Pause">
      <svg id="iconPlay"  width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" width="30" height="30" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="btn-ctrl btn-md" id="btnFF" title="Fast Forward">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>
    </button>
    <button class="btn-ctrl btn-sm" id="btnRepeat" title="Repeat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
    </button>
  </div>

  <!-- Volume -->
  <div class="volume-row">
    <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm11-1.91v.01c2.04.91 3.5 2.96 3.5 5.4 0 2.44-1.46 4.49-3.5 5.4V19c2.89-.91 5-3.63 5-6.9s-2.11-5.99-5-6.9v1.89z"/>
    </svg>
    <div class="vol-track" id="volTrack">
      <div class="vol-fill" id="volFill" style="width:70%">
        <div class="vol-thumb"></div>
      </div>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70">
    </div>
    <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
  </div>

  <!-- Select file -->
  <div class="select-row">
    <label class="btn-select" for="fileInput">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V6h5.17l2 2H20v10z"/>
      </svg>
      انتخاب فایل صوتی
    </label>
    <input type="file" id="fileInput" class="file-input" accept=".mp3,.wav,.ogg,.flac,.m4a">
  </div>

  <div class="status" id="statusMsg">اینجا یک فایل انتخاب کنید</div>
</div>

<audio id="audioEl"></audio>

<script>
  const audio      = document.getElementById('audioEl');
  const fileInput  = document.getElementById('fileInput');
  const btnPlay    = document.getElementById('btnPlay');
  const btnRewind  = document.getElementById('btnRewind');
  const btnFF      = document.getElementById('btnFF');
  const btnRepeat  = document.getElementById('btnRepeat');
  const btnShuffle = document.getElementById('btnShuffle');
  const iconPlay   = document.getElementById('iconPlay');
  const iconPause  = document.getElementById('iconPause');
  const timeCurrent= document.getElementById('timeCurrent');
  const timeDuration=document.getElementById('timeDuration');
  const trackName  = document.getElementById('trackName');
  const trackSub   = document.getElementById('trackSub');
  const statusMsg  = document.getElementById('statusMsg');
  const ringSvg    = document.getElementById('ringSvg');
  const coverImg   = document.getElementById('coverImg');
  const coverPlaceholder = document.getElementById('coverPlaceholder');
  const volSlider  = document.getElementById('volSlider');
  const volFill    = document.getElementById('volFill');
  const waveform   = document.getElementById('waveform');

  let isPlaying = false;
  let isRepeat  = false;
  let waveBars  = [];
  let totalBars = 60;

  // ---- Build waveform bars ----
  const heights = [];
  for (let i = 0; i < totalBars; i++) {
    const h = 6 + Math.random() * 28 + Math.sin(i * 0.4) * 6;
    heights.push(Math.max(6, h));
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = h + 'px';
    waveform.appendChild(bar);
    waveBars.push(bar);
  }

  // click waveform to seek
  waveform.addEventListener('click', e => {
    if (!audio.duration) return;
    const ratio = e.offsetX / waveform.offsetWidth;
    audio.currentTime = ratio * audio.duration;
    updateWave();
  });

  function updateWave() {
    if (!audio.duration) return;
    const pct = audio.currentTime / audio.duration;
    const played = Math.floor(pct * totalBars);
    waveBars.forEach((b, i) => {
      b.classList.toggle('played', i < played);
      b.classList.toggle('active', isPlaying && i === played);
    });
  }

  // ---- Volume ----
  volSlider.addEventListener('input', () => {
    const v = volSlider.value;
    audio.volume = v / 100;
    volFill.style.width = v + '%';
  });

  // ---- File load ----
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    audio.src = url;
    audio.load();

    const name = file.name.replace(/\.[^/.]+$/, '');
    trackName.textContent = name;
    trackSub.textContent  = file.type || 'audio';

    // try to show cover from ID3 if available (won't work cross-origin, that's fine)
    coverPlaceholder.style.display = 'flex';
    coverImg.style.display = 'none';

    audio.play().then(() => {
      setPlaying(true);
      setStatus('در حال پخش', 'ok');
    }).catch(() => setStatus('بارگذاری شد — Play بزنید'));
  });

  // ---- Play/Pause ----
  btnPlay.addEventListener('click', () => {
    if (!audio.src) return setStatus('ابتدا یک فایل انتخاب کنید', 'error');
    if (isPlaying) {
      audio.pause();
      setPlaying(false);
      setStatus('توقف موقت');
    } else {
      audio.play();
      setPlaying(true);
      setStatus('در حال پخش', 'ok');
    }
  });

  // ---- Rewind ----
  btnRewind.addEventListener('click', () => {
    audio.currentTime = 0;
    setStatus('برگشت به ابتدا');
  });

  // ---- FF ----
  btnFF.addEventListener('click', () => {
    if (audio.duration) audio.currentTime = Math.min(audio.currentTime + 10, audio.duration);
    setStatus('جلو رفت ۱۰ ثانیه');
  });

  // ---- Repeat ----
  btnRepeat.addEventListener('click', () => {
    isRepeat = !isRepeat;
    audio.loop = isRepeat;
    btnRepeat.classList.toggle('active', isRepeat);
    setStatus(isRepeat ? 'تکرار فعال' : 'تکرار غیرفعال');
  });

  // ---- Shuffle (visual only) ----
  btnShuffle.addEventListener('click', () => {
    btnShuffle.classList.toggle('active');
    setStatus(btnShuffle.classList.contains('active') ? 'تصادفی فعال' : 'تصادفی غیرفعال');
  });

  // ---- Time update ----
  audio.addEventListener('timeupdate', () => {
    timeCurrent.textContent = fmt(audio.currentTime);
    updateWave();
  });
  audio.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = fmt(audio.duration);
  });
  audio.addEventListener('ended', () => {
    if (!isRepeat) { setPlaying(false); setStatus('پخش تمام شد'); }
  });

  function setPlaying(val) {
    isPlaying = val;
    iconPlay.style.display  = val ? 'none' : '';
    iconPause.style.display = val ? '' : 'none';
    ringSvg.classList.toggle('playing', val);
    // cover rotation
    const imgs = document.querySelectorAll('.cover-img, .cover-placeholder');
    document.querySelectorAll('.cover-img').forEach(el => el.classList.toggle('playing', val));
    // also rotate placeholder
    coverPlaceholder.style.animation = val ? 'spin-ccw 8s linear infinite' : 'none';
  }

  function setStatus(msg, type = '') {
    statusMsg.textContent = msg;
    statusMsg.className = 'status ' + type;
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  }
</script>
</body>
</html>
